<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>System Notification</title>
  </head>

  <body
    style="
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      padding: 20px;
    "
  >
    <div
      style="
        max-width: 600px;
        margin: 0 auto;
        background-color: #ffffff;
        padding: 40px;
        border-radius: 8px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      "
    >
      <h2
        style="
          color: #333;
          text-align: center;
          border-bottom: 2px solid #007bff;
          padding-bottom: 10px;
        "
      >
        {{.Title}}
      </h2>
      <p style="color: #333; font-size: 16px; margin-top: 20px">
        Hello {{.Username}},
      </p>
      <div
        style="color: #555; font-size: 16px; line-height: 1.6; margin: 20px 0"
      >
        {{.Message}}
      </div>
      {{if .ActionURL}}
      <div style="text-align: center; margin: 30px 0">
        <a
          href="{{.ActionURL}}"
          style="
            background-color: #007bff;
            color: #ffffff;
            padding: 12px 24px;
            text-decoration: none;
            border-radius: 4px;
            font-weight: bold;
          "
          >{{.ActionText}}</a
        >
      </div>
      {{end}}
      <hr style="border: 0; border-top: 1px solid #eee; margin: 30px 0" />
      <p style="color: #999; font-size: 12px; text-align: center">
        Best regards,<br />The SummitMate Team
      </p>
    </div>
  </body>
</html>
