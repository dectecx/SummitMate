<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Registration Successful</title>
  </head>
  <body
    style="
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      padding: 20px;
    "
  >
    <div
      style="
        max-width: 600px;
        margin: 0 auto;
        background-color: #ffffff;
        padding: 40px;
        border-radius: 8px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      "
    >
      <h2 style="color: #28a745; text-align: center">
        Registration Successful!
      </h2>
      <p style="color: #333; font-size: 18px; text-align: center">
        Welcome to the SummitMate community, <strong>{{.Username}}</strong>!
      </p>
      <p style="color: #666; font-size: 16px">
        We're excited to have you on board. Start exploring and planning your
        hiking adventures today.
      </p>
      <div style="text-align: center; margin: 30px 0">
        <a
          href="{{.LoginURL}}"
          style="
            background-color: #007bff;
            color: #ffffff;
            padding: 12px 24px;
            text-decoration: none;
            border-radius: 4px;
            font-weight: bold;
          "
          >Login to Your Account</a
        >
      </div>
      <hr style="border: 0; border-top: 1px solid #eee; margin: 30px 0" />
      <p style="color: #999; font-size: 12px; text-align: center">
        Thank you for choosing SummitMate.
      </p>
    </div>
  </body>
</html>
