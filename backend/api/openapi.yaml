openapi: "3.0.3"
info:
  title: SummitMate API
  description: 嘉明湖登山行程助手 - 後端 API
  version: 0.1.0
  contact:
    name: SummitMate

servers:
  - url: http://localhost:8080/api/v1
    description: Local development

tags:
  - name: system
    description: System operations
  - name: auth
    description: Authentication & Authorization

paths:
  /health:
    get:
      summary: Health Check
      description: 檢查 API 服務是否正常運作
      operationId: getHealth
      tags:
        - system
      responses:
        "200":
          description: 服務正常
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /auth/register:
    post:
      summary: User Registration
      description: 註冊新使用者帳號
      operationId: registerUser
      tags:
        - auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: 註冊成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: 無效的請求 (例如 Email 格式錯誤或已存在)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      summary: User Login
      description: 登入並取得 JWT Token
      operationId: loginUser
      tags:
        - auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: 登入成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: 帳號或密碼錯誤
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      summary: Get Current User Profile
      description: 取得當前登入使用者的資料
      operationId: getCurrentUser
      tags:
        - auth
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 成功取得資料
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: 未登入或 Token 無效
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthResponse:
      type: object
      required:
        - status
        - version
      properties:
        status:
          type: string
          example: ok
        version:
          type: string
          example: 0.1.0

    ErrorResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          example: "此 Email 已經被註冊"

    User:
      type: object
      required:
        - id
        - email
        - display_name
        - avatar
        - is_active
        - is_verified
        - role
        - created_at
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        display_name:
          type: string
        avatar:
          type: string
        is_active:
          type: boolean
        is_verified:
          type: boolean
        role:
          type: string
          description: 使用者角色代碼 (e.g. ADMIN, LEADER, MEMBER)
        created_at:
          type: string
          format: date-time

    RegisterRequest:
      type: object
      required:
        - email
        - password
        - display_name
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
          minLength: 8
        display_name:
          type: string
          minLength: 2

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password

    AuthResponse:
      type: object
      required:
        - token
        - user
      properties:
        token:
          type: string
          description: JWT Access Token
        user:
          $ref: "#/components/schemas/User"
