        - email
        - code
      properties:
        email:
          type: string
          format: email
        code:
          type: string
          description: 收到的驗證碼

    ResendVerificationRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email

    # ---------------------------------------------------------------
    # Response Aliases (strict naming for mapping layer)
    # ---------------------------------------------------------------
    GearLibraryItemResponse:
      $ref: "#/components/schemas/GearLibraryItem"

    MealLibraryItemResponse:
      $ref: "#/components/schemas/MealLibraryItem"

    TripGearItemResponse:
      $ref: "#/components/schemas/TripGearItem"

    TripMealItemResponse:
      $ref: "#/components/schemas/TripMealItem"

    MessageResponse:
      $ref: "#/components/schemas/Message"

    PollResponse:
      $ref: "#/components/schemas/Poll"

    PollOptionResponse:
      $ref: "#/components/schemas/PollOption"

    FavoriteResponse:
      $ref: "#/components/schemas/Favorite"

    GroupEventResponse:
      $ref: "#/components/schemas/GroupEvent"

    GroupEventApplicationResponse:
      $ref: "#/components/schemas/GroupEventApplication"

    GroupEventCommentResponse:
      $ref: "#/components/schemas/GroupEventComment"

    WeatherRecord:
      type: object
      properties:
        id:
          type: string
          format: uuid
        location:
          type: string
        start_time:
          type: string
          format: date-time
        end_time:
          type: string
          format: date-time
        wx:
          type: string
        temp:
          type: number
        pop:
          type: integer
        min_temp:
          type: number
        max_temp:
          type: number
        humidity:
          type: number
        wind_speed:
          type: number
        min_at:
          type: number
        max_at:
          type: number
        issue_time:
          type: string
          format: date-time
          nullable: true
        fetched_at:
          type: string
          format: date-time

    LogUploadRequest:
      type: object
      required: [logs]
      properties:
        device_id:
          type: string
        device_name:
          type: string
        logs:
          type: array
          items:
            $ref: "#/components/schemas/LogEntry"

    LogEntry:
      type: object
      required: [timestamp, level, message]
      properties:
        timestamp:
          type: string
          format: date-time
        level:
          type: string
          enum: [debug, info, warning, error]
        message:
          type: string
        source:
          type: string
          nullable: true

    HeartbeatRequest:
      type: object
      required: [user_type, view, platform]
      properties:
        user_type:
          type: string
          description: 使用者類型 (e.g. member, guest)
        view:
          type: string
          description: 目前停留的畫面名稱
        platform:
          type: string
          description: 作業平台 (e.g. android, ios, web)
