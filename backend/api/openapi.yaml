components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthResponse:
      type: object
      required:
        - status
        - version
      properties:
        status:
          type: string
          example: ok
        version:
          type: string
          example: 0.1.0

    ErrorResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          example: "此 Email 已經被註冊"

    User:
      type: object
      required:
        - id
        - email
        - display_name
        - avatar
        - is_active
        - is_verified
        - role
        - created_at
        - created_by
        - updated_at
        - updated_by
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        display_name:
          type: string
        avatar:
          type: string
        is_active:
          type: boolean
        is_verified:
          type: boolean
        role:
          type: string
          description: 使用者角色代碼 (e.g. ADMIN, LEADER, MEMBER)
        created_at:
          type: string
          format: date-time
        created_by:
          type: string
          format: uuid
          nullable: true
        updated_at:
          type: string
          format: date-time
        updated_by:
          type: string
          format: uuid
          nullable: true

    RegisterRequest:
      type: object
      required:
        - email
        - password
        - display_name
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
          minLength: 8
        display_name:
          type: string
          minLength: 2

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password

    AuthResponse:
      type: object
      required:
        - token
        - user
      properties:
        token:
          type: string
          description: JWT Access Token
        user:
          $ref: "#/components/schemas/User"

    Trip:
      type: object
      required:
        - id
        - user_id
        - name
        - start_date
        - is_active
        - day_names
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
          description: 建立此行程的使用者 ID
        name:
          type: string
        description:
          type: string
          nullable: true
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
          nullable: true
        cover_image:
          type: string
          nullable: true
        is_active:
          type: boolean
        day_names:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    TripCreateRequest:
      type: object
      required:
        - name
        - start_date
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type: string
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        cover_image:
          type: string
        day_names:
          type: array
          items:
            type: string

    TripUpdateRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type: string
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        cover_image:
          type: string
        is_active:
          type: boolean
        day_names:
          type: array
          items:
            type: string

    TripMember:
      type: object
      required:
        - trip_id
        - user_id
        - joined_at
        - user_metadata
      properties:
        trip_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        joined_at:
          type: string
          format: date-time
        user_metadata:
          $ref: "#/components/schemas/User"

    AddMemberRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email

    ItineraryItem:
      type: object
      required:
        - id
        - trip_id
        - day
        - name
        - est_time
        - altitude
        - distance
        - note
        - is_checked_in
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        trip_id:
          type: string
          format: uuid
        day:
          type: string
        name:
          type: string
        est_time:
          type: string
          pattern: '^([0-1]?[0-9]|2[0-3]):[0-5][0-9]$'
