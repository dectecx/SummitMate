  /logs:
    post:
      tags: [system]
      summary: 上傳系統日誌
      description: 將客戶端日誌批次上傳至伺服器
      operationId: uploadLogs
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LogUploadRequest"
      responses:
        "200":
          description: 上傳成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer
                    description: 成功處理的日誌數量
        "401":
          description: 未授權
        "400":
          description: 格式錯誤

  /heartbeat:
    post:
      tags: [system]
      summary: 發送心跳訊號
      description: 客戶端定期發送心跳以更新活躍狀態
      operationId: heartbeat
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HeartbeatRequest"
      responses:
        "200":
          description: 成功更新
        "401":
          description: 未授權

  # --- Weather ---

  /weather/hiking:
    get:
      summary: List All Hiking Weather
      description: 取得所有登山天氣預報資料
      operationId: getHikingWeather
      tags:
        - weather
      responses:
        "200":
          description: 天氣資料列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WeatherRecord"

  /weather/hiking/{location}:
    get:
      summary: Get Hiking Weather by Location
      description: 取得特定地點的登山天氣預報
      operationId: getHikingWeatherByLocation
      tags:
        - weather
      parameters:
        - name: location
          in: path
          required: true
          schema:
            type: string
          description: 地點名稱 (如 玉山)
      responses:
        "200":
          description: 天氣資料列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WeatherRecord"
        "404":
          description: 找不到該地點資料

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthResponse:
      type: object
      required:
        - status
        - version
      properties:
        status:
          type: string
          example: ok
        version:
          type: string
          example: 0.1.0

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: object
          required:
            - type
            - code
            - message
          properties:
            type:
              type: string
              description: 錯誤分類
              enum:
                - validation_error
                - auth_error
                - business_logic_error
                - invalid_request_error
                - server_error
              example: "business_logic_error"
            code:
              type: string
              description: 業務錯誤碼，供程式判斷或多國語系對應
              example: "email_already_exists"
            message:
              type: string
              description: 易於閱讀的具體錯誤原因說明
              example: "此 Email 已經被註冊"
            param:
              type: string
              nullable: true
              description: 指出導致錯誤的特定請求參數或欄位
              example: "email"

