openapi: "3.0.3"
info:
  title: SummitMate API
  description: 嘉明湖登山行程助手 - 後端 API
  version: 0.1.0
  contact:
    name: SummitMate

servers:
  - url: http://localhost:8080/api/v1
    description: Local development

tags:
  - name: system
    description: System operations
  - name: auth
    description: Authentication & Authorization
  - name: trips
    description: Trip Management
  - name: gear-library
    description: Personal Gear Library
  - name: meal-library
    description: Personal Meal Library

paths:
  /health:
    get:
      summary: Health Check
      description: 檢查 API 服務是否正常運作
      operationId: getHealth
      tags:
        - system
      responses:
        "200":
          description: 服務正常
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /auth/register:
    post:
      summary: User Registration
      description: 註冊新使用者帳號
      operationId: registerUser
      tags:
        - auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: 註冊成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: 無效的請求 (例如 Email 格式錯誤或已存在)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      summary: User Login
      description: 登入並取得 JWT Token
      operationId: loginUser
      tags:
        - auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: 登入成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: 帳號或密碼錯誤
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      summary: Get Current User Profile
      description: 取得當前登入使用者的資料
      operationId: getCurrentUser
      tags:
        - auth
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 成功取得資料
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: 未登入或 Token 無效
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /trips:
    get:
      summary: List Trips
      description: 取得我建立或加入的行程列表
      operationId: listTrips
      tags:
        - trips
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 回傳行程列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Trip"
        "401":
          description: 未登入
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      summary: Create Trip
      description: 建立新行程
      operationId: createTrip
      tags:
        - trips
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TripCreateRequest"
      responses:
        "201":
          description: 成功建立行程
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trip"
        "400":
          description: 參數錯誤
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: 未登入

  /trips/{tripId}:
    get:
      summary: Get Trip
      description: 取得特定行程詳細資料
      operationId: getTrip
      tags:
        - trips
      security:
        - bearerAuth: []
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trip"
        "401":
          description: 未登入
        "403":
          description: 無權限存取
        "404":
          description: 行程不存在
    put:
      summary: Update Trip
      description: 更新行程資料
      operationId: updateTrip
      tags:
        - trips
      security:
        - bearerAuth: []
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TripUpdateRequest"
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trip"
        "401":
          description: 未登入
        "403":
          description: 無權限更新
        "404":
          description: 行程不存在
    delete:
      summary: Delete Trip
      description: 刪除行程
      operationId: deleteTrip
      tags:
        - trips
      security:
        - bearerAuth: []
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: 成功刪除
        "401":
          description: 未登入
        "403":
          description: 無權限刪除 (只有創建者可刪除)
        "404":
          description: 行程不存在

  /trips/{tripId}/members:
    get:
      summary: List Trip Members
      description: 取得行程成員列表
      operationId: listTripMembers
      tags:
        - trips
      security:
        - bearerAuth: []
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: 回傳成員列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TripMember"
        "403":
          description: 無權限存取
    post:
      summary: Add Trip Member
      description: 新增成員到行程 (以 email 作為邀請依據)
      operationId: addTripMember
      tags:
        - trips
      security:
        - bearerAuth: []
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddMemberRequest"
      responses:
        "201":
          description: 成功加入成員
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TripMember"
        "400":
          description: 使用者無法加入 (例如已經是成員，或 email 不存在)
        "403":
          description: 無權限新增成員

  /trips/{tripId}/members/{userId}:
    delete:
      summary: Remove Trip Member
      description: 將成員移出行程
      operationId: removeTripMember
      tags:
        - trips
      security:
        - bearerAuth: []
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: 成功移除
        "403":
          description: 無權限移除成員
        "404":
          description: 找不到該成員或行程

  /trips/{tripId}/itinerary:
    get:
      summary: List Itinerary
      description: 取得行程表
      operationId: listItinerary
      tags:
        - trips
      security:
        - bearerAuth: []
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: 回傳行程表節點列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ItineraryItem"
        "403":
          description: 無權限存取
    post:
      summary: Add Itinerary Item
      description: 新增行程表節點
      operationId: addItineraryItem
      tags:
        - trips
      security:
        - bearerAuth: []
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ItineraryItemRequest"
      responses:
        "201":
          description: 成功新增
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItineraryItem"
        "400":
          description: 參數錯誤
        "403":
          description: 無權限編輯

  /trips/{tripId}/itinerary/{itemId}:
    put:
      summary: Update Itinerary Item
      description: 更新行程表節點
      operationId: updateItineraryItem
      tags:
        - trips
      security:
        - bearerAuth: []
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: itemId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ItineraryItemRequest"
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItineraryItem"
        "403":
          description: 無權限編輯
        "404":
          description: 找不到該節點
    delete:
      summary: Delete Itinerary Item
      description: 刪除行程表節點
      operationId: deleteItineraryItem
      tags:
        - trips
      security:
        - bearerAuth: []
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: itemId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: 成功刪除
        "403":
          description: 無權限編輯
        "404":
          description: 找不到該節點

  /gear-library:
    get:
      summary: List Gear Library Items
      description: 取得使用者的個人裝備庫列表 (已封存的可透過參數過濾)
      operationId: listGearLibrary
      tags:
        - gear-library
      security:
        - bearerAuth: []
      parameters:
        - name: include_archived
          in: query
          required: false
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: 成功回傳列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GearLibraryItem"
        "401":
          description: 未登入
    post:
      summary: Create Gear Library Item
      description: 新增個人裝備至庫中
      operationId: createGearLibraryItem
      tags:
        - gear-library
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GearLibraryItemRequest"
      responses:
        "201":
          description: 成功建立裝備
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GearLibraryItem"
        "400":
          description: 參數錯誤
        "401":
          description: 未登入

  /gear-library/{itemId}:
    get:
      summary: Get Gear Library Item
      description: 取得單一裝備詳情
      operationId: getGearLibraryItem
      tags:
        - gear-library
      security:
        - bearerAuth: []
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: 成功取得裝備
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GearLibraryItem"
        "401":
          description: 未登入
        "403":
          description: 無權限存取
        "404":
          description: 找不到該裝備
    put:
      summary: Update Gear Library Item
      description: 更新個人裝備資料
      operationId: updateGearLibraryItem
      tags:
        - gear-library
      security:
        - bearerAuth: []
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GearLibraryItemRequest"
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GearLibraryItem"
        "401":
          description: 未登入
        "403":
          description: 無權限編輯
        "404":
          description: 找不到該裝備
    delete:
      summary: Delete Gear Library Item
      description: 刪除個人裝備 (支援實體刪除)
      operationId: deleteGearLibraryItem
      tags:
        - gear-library
      security:
        - bearerAuth: []
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: 成功刪除
        "401":
          description: 未登入
        "403":
          description: 無權限編輯
        "404":
          description: 找不到該裝備

  /meal-library:
    get:
      summary: List Meal Library Items
      description: 取得使用者的個人食物庫列表
      operationId: listMealLibrary
      tags:
        - meal-library
      security:
        - bearerAuth: []
      parameters:
        - name: include_archived
          in: query
          required: false
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: 成功回傳食物列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MealLibraryItem"
        "401":
          description: 未登入
    post:
      summary: Create Meal Library Item
      description: 新增個人食物至庫中
      operationId: createMealLibraryItem
      tags:
        - meal-library
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MealLibraryItemRequest"
      responses:
        "201":
          description: 成功建立食物
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MealLibraryItem"
        "400":
          description: 參數錯誤
        "401":
          description: 未登入

  /meal-library/{itemId}:
    get:
      summary: Get Meal Library Item
      description: 取得單一食物詳情
      operationId: getMealLibraryItem
      tags:
        - meal-library
      security:
        - bearerAuth: []
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: 成功取得食物
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MealLibraryItem"
        "401":
          description: 未登入
        "403":
          description: 無權限存取
        "404":
          description: 找不到該食物
    put:
      summary: Update Meal Library Item
      description: 更新個人食物資料
      operationId: updateMealLibraryItem
      tags:
        - meal-library
      security:
        - bearerAuth: []
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MealLibraryItemRequest"
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MealLibraryItem"
        "401":
          description: 未登入
        "403":
          description: 無權限編輯
        "404":
          description: 找不到該食物
    delete:
      summary: Delete Meal Library Item
      description: 刪除個人食物
      operationId: deleteMealLibraryItem
      tags:
        - meal-library
      security:
        - bearerAuth: []
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: 成功刪除
        "401":
          description: 未登入
        "403":
          description: 無權限編輯
        "404":
          description: 找不到該食物

  /trips/{tripId}/gear:
    get:
      summary: Get Trip Gear Items
      description: 取得行程的所有裝備清單
      operationId: listTripGearItems
      tags:
        - trip-gear
      security:
        - bearerAuth: []
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: 成功取得裝備清單
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TripGearItem"
        "401":
          description: 未登入
        "403":
          description: 無權限存取
        "404":
          description: 找不到該行程
    post:
      summary: Add Trip Gear Item
      description: 新增裝備到行程
      operationId: addTripGearItem
      tags:
        - trip-gear
      security:
        - bearerAuth: []
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TripGearItemRequest"
      responses:
        "201":
          description: 成功新增裝備
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TripGearItem"
        "400":
          description: 參數錯誤
        "401":
          description: 未登入
        "403":
          description: 無權限編輯
        "404":
          description: 找不到該行程

  /trips/{tripId}/gear/{itemId}:
    put:
      summary: Update Trip Gear Item
      description: 更新行程中的裝備
      operationId: updateTripGearItem
      tags:
        - trip-gear
      security:
        - bearerAuth: []
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: itemId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TripGearItemRequest"
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TripGearItem"
        "400":
          description: 參數錯誤
        "401":
          description: 未登入
        "403":
          description: 無權限編輯
        "404":
          description: 找不到該行程或裝備
    delete:
      summary: Delete Trip Gear Item
      description: 從行程中移除裝備
      operationId: deleteTripGearItem
      tags:
        - trip-gear
      security:
        - bearerAuth: []
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: itemId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: 成功移除裝備
        "401":
          description: 未登入
        "403":
          description: 無權限編輯
        "404":
          description: 找不到該行程或裝備

  /trips/{tripId}/meals:
    get:
      summary: Get Trip Meal Items
      description: 取得行程的所有食物清單
      operationId: listTripMealItems
      tags:
        - trip-meals
      security:
        - bearerAuth: []
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: 成功取得食物清單
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TripMealItem"
        "401":
          description: 未登入
        "403":
          description: 無權限存取
        "404":
          description: 找不到該行程
    post:
      summary: Add Trip Meal Item
      description: 新增食物到行程
      operationId: addTripMealItem
      tags:
        - trip-meals
      security:
        - bearerAuth: []
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TripMealItemRequest"
      responses:
        "201":
          description: 成功新增食物
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TripMealItem"
        "400":
          description: 參數錯誤
        "401":
          description: 未登入
        "403":
          description: 無權限編輯
        "404":
          description: 找不到該行程

  /trips/{tripId}/meals/{itemId}:
    put:
      summary: Update Trip Meal Item
      description: 更新行程中的食物
      operationId: updateTripMealItem
      tags:
        - trip-meals
      security:
        - bearerAuth: []
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: itemId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TripMealItemRequest"
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TripMealItem"
        "400":
          description: 參數錯誤
        "401":
          description: 未登入
        "403":
          description: 無權限編輯
        "404":
          description: 找不到該行程或食物
    delete:
      summary: Delete Trip Meal Item
      description: 從行程中移除食物
      operationId: deleteTripMealItem
      tags:
        - trip-meals
      security:
        - bearerAuth: []
      parameters:
        - name: tripId
