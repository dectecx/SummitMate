name: summitmate
description: "SummitMate (山友) - 嘉明湖登山行程助手"
publish_to: "none"
version: 0.0.10+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  font_awesome_flutter: ^10.6.0
  photo_view: ^0.15.0
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2

  # 本地資料庫
  drift: ^2.20.0
  drift_flutter: ^0.2.0
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.5

  # API 請求
  retrofit: ^4.4.1
  freezed_annotation: ^3.0.0

  # 狀態管理與依賴注入
  get_it: ^8.0.0

  # 工具套件
  intl: ^0.19.0
  uuid: ^4.5.0
  package_info_plus: ^8.0.0
  shared_preferences: ^2.3.0
  url_launcher: ^6.3.0

  # 程式碼生成輔助
  json_annotation: ^4.11.0
  flutter_slidable: ^4.0.3
  flutter_map: ^8.1.0
  latlong2: ^0.9.1
  gpx: ^2.3.0
  file_picker: ^10.0.0
  flutter_map_tile_caching: ^10.1.1
  geolocator: ^14.0.2
  flutter_compass: ^0.8.1
  permission_handler: ^12.0.1
  flutter_secure_storage: ^9.2.4
  internet_connection_checker: ^3.0.1
  twicon: ^1.0.1
  dio: ^5.9.0
  flutter_bloc: ^9.1.1
  equatable: ^2.0.8
  google_mobile_ads: ^7.0.0
  share_plus: ^12.0.1

  collection: ^1.19.1
  cached_network_image: ^3.4.1
  injectable: ^2.7.1+4
  meta: ^1.17.0
  url_strategy: ^0.2.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Drift 程式碼生成
  drift_dev: ^2.20.0

  # 程式碼生成
  build_runner: ^2.13.1
  json_serializable: ^6.13.0
  freezed: ^3.0.6
  retrofit_generator: ^10.2.3

  # 視覺配置
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.7

  # 測試工具
  mocktail: ^1.0.4
  bloc_test: ^10.0.0

  path_provider_platform_interface: any
  plugin_platform_interface: any
  injectable_generator: ^2.12.1

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
    image_path: "assets/icon.png"
    background_color: "#2E7D32"
    theme_color: "#2E7D32"
  image_path: "assets/icon.png"
  adaptive_icon_background: "#0D2137"
  adaptive_icon_foreground: "assets/icon.png"

flutter_native_splash:
  color: "#0D2137"
  image: assets/icon.png
  android_12:
    image: assets/icon.png
    color: "#0D2137"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/data/
