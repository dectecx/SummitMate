name: Deploy Backend to GCP Cloud Run

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/deploy_to_gcp.yml'
  workflow_dispatch: # 允許手動觸發

env:
  REGION: us-central1
  SERVICE_NAME: summitmate-api
  REGISTRY: us-central1-docker.pkg.dev
  IMAGE: us-central1-docker.pkg.dev/summitmate/summitmate-repo/api
  RUNTIME_SA: summitmate-runtime-sa@summitmate.iam.gserviceaccount.com

jobs:
  # ─────────────────────────────────────────
  # Job 1: Run Tests
  # ─────────────────────────────────────────
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: 📚 Checkout
        uses: actions/checkout@v4

      - name: 🐹 Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'backend/go.mod'
          cache-dependency-path: 'backend/go.sum'

      - name: 📦 Download Dependencies
        run: go mod download

      - name: 🧪 Run Unit Tests
        # 使用 -short 跳過需要資料庫連線的 E2E/整合測試
        # 如需完整整合測試，可另建獨立 job 並帶起測試用 PostgreSQL
        run: go test -v -short ./...

  # ─────────────────────────────────────────
  # Job 2: Build & Deploy (only after tests pass)
  # ─────────────────────────────────────────
  deploy:
    name: 🚀 Build & Deploy
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      id-token: write

    steps:
      - name: 📚 Checkout
        uses: actions/checkout@v4

      - name: 🔐 Authenticate to GCP
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          token_format: 'access_token'

      - name: ☁️ Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: 🐳 Docker Auth
        uses: 'docker/login-action@v3'
        with:
          username: 'oauth2accesstoken'
          password: '${{ steps.auth.outputs.access_token }}'
          registry: '${{ env.REGION }}-docker.pkg.dev'

      - name: 🏗️ Build Docker Image
        working-directory: backend
        run: |
          docker build \
            -t ${{ env.IMAGE }}:${{ github.sha }} \
            -t ${{ env.IMAGE }}:latest \
            .

      - name: 📤 Push to Artifact Registry
        run: |
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      - name: 🚀 Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image=${{ env.IMAGE }}:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --service-account=${{ env.RUNTIME_SA }} \
            --set-env-vars="ENV=production,CACHE_TYPE=memory" \
            --set-secrets="DB_HOST=DB_HOST:latest,DB_PORT=DB_PORT:latest,DB_USER=DB_USER:latest,DB_PASS=DB_PASS:latest,DB_NAME=DB_NAME:latest,JWT_SECRET=JWT_SECRET:latest,CWA_API_KEY=CWA_API_KEY:latest,SMTP_USER=SMTP_USER:latest,SMTP_PASS=SMTP_PASS:latest,REDIS_ADDR=REDIS_ADDR:latest,REDIS_PASSWORD=REDIS_PASSWORD:latest,REDIS_DB=REDIS_DB:latest" \
            --quiet

      - name: ✅ Output Deployed URL
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region=${{ env.REGION }} \
            --format="value(status.url)")
          echo "🎉 Deployed: ${URL}"
          echo "::notice title=Deployed URL::${URL}"
