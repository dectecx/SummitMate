services:
  db:
    image: postgres:18-alpine
    container_name: summitmate-db
    restart: "no"
    environment:
      POSTGRES_DB: summitmate
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev2026!
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: summitmate-api
    profiles:
      - api
    restart: "no"
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: dev
      DB_PASS: dev2026!
      DB_NAME: summitmate
      DB_SSLMODE: disable
      ENV: development
    depends_on:
      - db

volumes:
  pgdata:
